<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a12">
  <meta name="description" content="STANY PAIRING - QR Code Pairing">
  
  <meta property="og:title" content="STANY TZ • QR Pairing">
  <meta property="og:description" content="Scan QR code to pair your WhatsApp">
  <meta property="og:image" content="https://raw.githubusercontent.com/stanytz378/stanyimagesservers/refs/heads/main/bg.png">
  
  <title>STANY TZ • QR Pairing</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0a0a12;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08);
      --neon: #00ff88;
      --neon2: #00cfff;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.5);
      --danger: #ff5050;
      --glass: blur(20px) saturate(180%);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    body {
      background: url('https://raw.githubusercontent.com/stanytz378/stanyimagesservers/refs/heads/main/bg.png') center/cover fixed;
      background-blend-mode: overlay;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(10, 10, 18, 0.7), rgba(10, 10, 18, 0.95));
      z-index: 0;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.2), transparent 70%);
      top: -100px;
      left: -100px;
      animation: drift 20s ease-in-out infinite alternate;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(0, 207, 255, 0.15), transparent 70%);
      bottom: -100px;
      right: -80px;
      animation: drift 24s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      to { transform: translate(50px, 50px); }
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--neon);
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }

    .brand {
      text-align: center;
      margin-bottom: 24px;
      animation: fadeUp 0.6s ease;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 22px;
      border: 2px solid var(--neon);
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
      margin-bottom: 16px;
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
      50% { box-shadow: 0 0 50px rgba(0, 255, 136, 0.6); }
    }

    .title {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.7));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title span {
      background: linear-gradient(135deg, var(--neon), var(--neon2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* Card */
    .card {
      width: 100%;
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 30px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .card-title i {
      color: var(--neon);
      font-size: 24px;
    }

    .card-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* QR display area */
    .qr-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .qr-frame {
      background: white;
      padding: 16px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
      position: relative;
    }

    .qr-frame::before,
    .qr-frame::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--neon);
      z-index: 2;
    }

    .qr-frame::before {
      top: 6px;
      left: 6px;
      border-right: none;
      border-bottom: none;
      border-radius: 8px 0 0 0;
    }

    .qr-frame::after {
      bottom: 6px;
      right: 6px;
      border-left: none;
      border-top: none;
      border-radius: 0 0 8px 0;
    }

    .qr-frame-inner {
      position: relative;
    }

    .qr-frame-inner::before,
    .qr-frame-inner::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid var(--neon2);
      z-index: 2;
    }

    .qr-frame-inner::before {
      top: 6px;
      right: 6px;
      border-left: none;
      border-bottom: none;
      border-radius: 0 8px 0 0;
    }

    .qr-frame-inner::after {
      bottom: 6px;
      left: 6px;
      border-right: none;
      border-top: none;
      border-radius: 0 0 0 8px;
    }

    #qrImage {
      display: block;
      width: 220px;
      height: 220px;
      border-radius: 12px;
      image-rendering: pixelated;
    }

    .status-text {
      font-size: 13px;
      color: var(--neon);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      min-height: 20px;
    }

    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(0, 255, 136, 0.2);
      border-top-color: var(--neon);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Steps */
    .steps {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--neon);
      flex-shrink: 0;
    }

    .step-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .step-text strong {
      color: var(--text);
    }

    /* Error state */
    .error-area {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 30px 0;
      text-align: center;
    }

    .error-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--danger);
    }

    .error-message {
      font-size: 14px;
      color: var(--danger);
    }

    .retry-btn {
      padding: 12px 28px;
      background: rgba(0, 207, 255, 0.1);
      border: 1px solid rgba(0, 207, 255, 0.2);
      border-radius: 100px;
      color: var(--neon2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
    }

    .retry-btn:hover {
      background: rgba(0, 207, 255, 0.2);
      transform: translateY(-2px);
    }

    /* Back link */
    .back-link {
      margin-top: 28px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .back-link:hover {
      color: var(--text);
    }

    .back-link i {
      font-size: 14px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container { padding: 16px; }
      .card { padding: 24px 18px; }
      #qrImage { width: 180px; height: 180px; }
    }

    @media (max-height: 600px) and (orientation: landscape) {
      .container { padding: 10px; }
      .logo { width: 60px; height: 60px; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; }
    }

    :focus-visible {
      outline: 2px solid var(--neon2);
      outline-offset: 2px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,207,255,0.3); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <canvas id="canvas"></canvas>

  <div class="container">
    <div class="badge">
      <i class="fa-solid fa-qrcode"></i>
      <span>QR PAIRING</span>
    </div>

    <div class="brand">
      <img src="https://raw.githubusercontent.com/stanytz378/stanyimagesservers/refs/heads/main/bg.png" class="logo" onerror="this.style.display='none'">
      <h2 class="title">STANY<span>TZ</span></h2>
      <div class="subtitle">Scan to Connect</div>
    </div>

    <div class="card">
      <div class="card-title">
        <i class="fa-solid fa-mobile-screen"></i>
        <span>Link Device</span>
      </div>
      <div class="card-hint">
        Open WhatsApp → Linked Devices → Link a Device
      </div>

      <!-- Loading State -->
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <div class="status-text">Generating QR Code...</div>
      </div>

      <!-- QR Display -->
      <div id="qrDisplay" class="qr-wrapper" style="display: none;">
        <div class="qr-frame">
          <div class="qr-frame-inner">
            <img id="qrImage" src="" alt="QR Code">
          </div>
        </div>
        <div id="qrStatus" class="status-text">Waiting for scan...</div>

        <div class="steps">
          <div class="step">
            <div class="step-num">1</div>
            <div class="step-text">Open WhatsApp on your phone</div>
          </div>
          <div class="step">
            <div class="step-num">2</div>
            <div class="step-text">Go to <strong>Settings</strong> → <strong>Linked Devices</strong></div>
          </div>
          <div class="step">
            <div class="step-num">3</div>
            <div class="step-text">Tap <strong>Link a Device</strong> and scan this QR</div>
          </div>
        </div>
      </div>

      <!-- Error State -->
      <div id="errorDisplay" class="error-area">
        <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div id="errorMessage" class="error-message">Failed to load QR. Please try again.</div>
        <button id="retryBtn" class="retry-btn"><i class="fa-solid fa-rotate-right"></i> Retry</button>
      </div>
    </div>

    <a href="/" class="back-link">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
  </div>

  <script>
    // Security
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });

    // Elements
    const loading = document.getElementById('loading');
    const qrDisplay = document.getElementById('qrDisplay');
    const errorDisplay = document.getElementById('errorDisplay');
    const qrImage = document.getElementById('qrImage');
    const qrStatus = document.getElementById('qrStatus');
    const errorMessage = document.getElementById('errorMessage');
    const retryBtn = document.getElementById('retryBtn');

    let refreshTimeout;

    async function loadQR() {
      // Clear any existing timeout
      if (refreshTimeout) clearTimeout(refreshTimeout);

      // Show loading, hide others
      loading.style.display = 'flex';
      qrDisplay.style.display = 'none';
      errorDisplay.style.display = 'none';

      try {
        // Real backend call to /qr
        const response = await fetch('/qr', {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          credentials: 'same-origin'
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${response.status}`);
        }

        const data = await response.json();
        // Handle different response formats
        const qrData = data.qr || data.qrCode || data.code || data.pairCode;
        if (!qrData) throw new Error('No QR data received');

        // Set image source
        if (qrData.startsWith('data:image') || qrData.startsWith('http')) {
          qrImage.src = qrData;
        } else {
          qrImage.src = `data:image/png;base64,${qrData}`;
        }

        // Wait for image to load
        await new Promise((resolve, reject) => {
          qrImage.onload = resolve;
          qrImage.onerror = () => reject(new Error('Failed to load image'));
        });

        // Update status if provided
        if (data.message) qrStatus.textContent = data.message;
        else qrStatus.textContent = 'Scan with WhatsApp • Refreshes in 60s';

        // Show QR, hide loading
        loading.style.display = 'none';
        qrDisplay.style.display = 'flex';

        // Auto-refresh after 60 seconds
        refreshTimeout = setTimeout(() => {
          if (qrDisplay.style.display !== 'none') {
            qrStatus.textContent = 'Refreshing...';
            loadQR();
          }
        }, 60000);

      } catch (err) {
        console.error('QR error:', err);
        errorMessage.textContent = err.message || 'Failed to load QR. Check connection.';
        loading.style.display = 'none';
        errorDisplay.style.display = 'flex';
      }
    }

    retryBtn.addEventListener('click', loadQR);
    loadQR();

    // Particles background (same as main)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    let animFrame;

    function initParticles() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      const count = Math.min(Math.floor(width * height / 15000), 50);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          size: Math.random() * 2 + 1,
          opacity: Math.random() * 0.3 + 0.1
        });
      }
    }

    function drawParticles() {
      ctx.clearRect(0, 0, width, height);
      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0, 207, 255, ${0.1 * (1 - dist/120)})`;
            ctx.stroke();
          }
        }
        // Update
        particles[i].x += particles[i].vx;
        particles[i].y += particles[i].vy;
        if (particles[i].x < 0 || particles[i].x > width) particles[i].vx *= -1;
        if (particles[i].y < 0 || particles[i].y > height) particles[i].vy *= -1;
        // Draw
        ctx.beginPath();
        ctx.arc(particles[i].x, particles[i].y, particles[i].size, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0, 207, 255, ${particles[i].opacity})`;
        ctx.fill();
      }
      animFrame = requestAnimationFrame(drawParticles);
    }

    window.addEventListener('resize', () => {
      clearTimeout(window.resizeTimer);
      window.resizeTimer = setTimeout(() => {
        cancelAnimationFrame(animFrame);
        initParticles();
        drawParticles();
      }, 200);
    });

    initParticles();
    drawParticles();

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) cancelAnimationFrame(animFrame);
      else drawParticles();
    });
  </script>
</body>
</html>
